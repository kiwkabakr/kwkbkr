# /etc/nginx/sites-available/czutkagg
# After `certbot --nginx -d czutka.gg -d www.czutka.gg` this file is
# rewritten with listen 443 ssl + a separate :80 -> :443 redirect block.
# Keep it simple here; certbot handles TLS.

server {
  listen 80;
  listen [::]:80;
  server_name czutka.gg www.czutka.gg;

  root /var/www/czutkagg/dist;
  index index.html;

  # 10 MB matches backend express.json limit (image uploads etc.)
  client_max_body_size 10m;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Hashed Vite assets — immutable, cache aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Don't cache the HTML shell — clients must pick up new asset hashes
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Backend API — nginx terminates TLS, express.js trusts 1 proxy hop
  location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA fallback — client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }
}
